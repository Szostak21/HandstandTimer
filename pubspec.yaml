name: handstand_timer
description: "AI-powered handstand timer using pose detection."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Camera & ML (Phase 2 — Dev A)
  camera: ^0.11.1
  google_mlkit_pose_detection: ^0.12.0

  # Local Database (Phase 3 — Dev B)
  sqflite: ^2.4.2
  path_provider: ^2.1.5

  # Charts (Phase 3 — Dev B)
  fl_chart: ^0.70.2

  # Settings persistence
  shared_preferences: ^2.5.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
